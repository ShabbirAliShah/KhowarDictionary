<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khowar Dictionary</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent: #666;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo { position: fixed; top: 20px; left: 30px; font-weight: bold; color: var(--accent); z-index: 100; }

        .viewport {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 35vh;
            transition: padding-top 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .viewport.searching { padding-top: 80px; }

        .search-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 5px 20px;
            width: 85%;
            max-width: 550px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            height: 55px;
            font-size: 1.3rem;
        }

        #result-area { width: 90%; max-width: 650px; margin-top: 30px; }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.03);
            animation: slideUp 0.4s ease forwards;
        }

        .khowar-script { font-size: 2.2rem; direction: rtl; font-family: 'Urdu Typesetting', 'Noto Nastaliq Urdu', serif; }
        .label { font-size: 0.7rem; color: #999; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-top: 20px; display: block; }
        .audio-btn { background: #000; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-size: 0.9rem; }
        .audio-btn:hover { background: #333; }
        .suggestion-box { background: #f9f9f9; padding: 20px; border-radius: 12px; color: #555; }
        .suggest-link { color: #007bff; cursor: pointer; text-decoration: underline; font-weight: bold; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="logo">Khowar Dictionary</div>

<div class="viewport" id="mainViewport">
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search Khowar, script, or English..." autocomplete="off">
    </div>
    <div id="result-area"></div>
</div>

<script src="database.js"></script>
<script>
    const searchInput = document.getElementById('searchInput');
    const viewport = document.getElementById('mainViewport');
    const resultArea = document.getElementById('result-area');
    
    console.log("Database Loaded: " + dictionary.length + " words");

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim().toLowerCase();
        
        if (query.length > 0) {
            viewport.classList.add('searching');
            performSearch(query);
        } else {
            viewport.classList.remove('searching');
            resultArea.innerHTML = "";
        }
    });

    function performSearch(query) {
        // 1. Search Logic: Checks Word, Script, and English Meaning
        const results = dictionary.filter(item => 
            item.word.toLowerCase().includes(query) || 
            item.khowar_script.includes(query) || 
            item.meaning.toLowerCase().includes(query)
        );

        if (results.length > 0) {
            // Show the best match
            renderWord(results[0]);
        } else {
            // 2. Suggestion Logic: Finding close spelling matches
            findSuggestion(query);
        }
    }

    function findSuggestion(query) {
        // Simple fuzzy match: finds words starting with same 2 letters
        const suggestion = dictionary.find(item => 
            item.word.toLowerCase().startsWith(query.substring(0, 2))
        );

        if (suggestion) {
            resultArea.innerHTML = `
                <div class="suggestion-box">
                    No exact match. Did you mean <span class="suggest-link" onclick="autoFill('${suggestion.word}')">${suggestion.word}</span>?
                </div>`;
        } else {
            resultArea.innerHTML = `<div class="suggestion-box">No results found for "${query}".</div>`;
        }
    }

    function autoFill(word) {
        searchInput.value = word;
        performSearch(word.toLowerCase());
    }

    function renderWord(data) {
        resultArea.innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h1 style="margin:0; font-size: 2.5rem;">${data.word}</h1>
                        <p style="color:var(--accent); font-style:italic; margin: 5px 0;">${data.grammar}</p>
                    </div>
                    <div class="khowar-script">${data.khowar_script}</div>
                </div>

                ${data.audio_url ? `<button class="audio-btn" onclick="new Audio('${data.audio_url}').play()">🔊 Listen Pronunciation</button>` : ''}

                <span class="label">English Meaning</span>
                <p style="font-size:1.3rem; margin: 10px 0;">${data.meaning}</p>

                <span class="label">Khowar Example</span>
                <p class="khowar-script" style="font-size: 1.5rem; margin: 10px 0;">${data.example_khowar}</p>
                
                <span class="label">Translation</span>
                <p><em>${data.example_english}</em></p>
            </div>
        `;
    }
</script>

</body>
</html>
